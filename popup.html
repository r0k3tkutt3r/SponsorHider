<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>SponsorHider</h1>
    <p class="status" id="status"></p>
    <label class="toggle">
      <input type="checkbox" id="blockSponsors" />
      <span>Hide sponsored results</span>
    </label>
    <p class="hint" id="sponsorHint"></p>
    <label class="toggle">
      <input type="checkbox" id="hideAi" />
      <span>Also hide AI Overview</span>
    </label>
    <p class="hint" id="aiHint"></p>
    <script src="popup.js"></script>
  </body>
</html>
